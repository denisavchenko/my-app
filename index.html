<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="https://openlayers.org/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Using OpenLayers with Vite</title>
  </head>
  <body>
    <div id="map"></div>
    <select id="basemap">
      <option value="osm">Карта</option>
      <option value="satellite">Спутник</option>
      <option value="mapbox">Mapbox</option>
    </select>
    <div id="legend">
      <strong>Легенда</strong>
      
      <ul>
        <li><span class="leg-color leg-iso-20"></span>Изохрона 20 мин</li>
        <li><span class="leg-color leg-iso-40"></span>Изохрона 40 мин</li>
        <li><span class="leg-color leg-iso-60"></span>Изохрона 60 мин</li>
        <li><img id="leg-aeroports" alt="">Аэропорты</li>
        <li><span class="leg-color leg-stadium"></span>Стадионы ЧМ</li>
        <li><img id="leg-fanfest" alt="">Фан-фестивали</li>
        <li><img id="leg-shuttle" alt="">Шаттл-хабы</li>
        <li><img id="leg-attractions" alt="">Достопримечательности</li>
        <li><img id="leg-experiences" alt="">Впечатления</li>
      </ul>
    </div>
    <div id="popup" class="popup">
      <button id="popup-closer" type="button">&times;</button>
      <div id="popup-content"></div>
    </div>
    <script type="module" src="./scripts/main.js"></script>
  </body>
</html>
